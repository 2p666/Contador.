<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Próximo Encontro</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #FFD700;
            --star-color: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Imagem de Fundo */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('ContImg/GoghS.jfif'); 
            background-size: cover;
            background-position: center;
            
            /* Começa invisível (opacidade 0) e com blur */
            opacity: 0;
            filter: blur(30px); 
            transition: all 4s ease-in-out;
            z-index: 1; /* Aumentado para ficar acima do fundo preto */
        }

        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 20%, black 150%);
            z-index: 2;
            transition: opacity 2s;
            pointer-events: none;
        }

        /* ESTADO QUANDO CHEGAR A ZERO */
        body.together .background-overlay {
            opacity: 1;
            filter: blur(0px); 
            transform: scale(1.05);
        }

        /* Esconde as estrelas para a imagem aparecer melhor */
        body.together #star-field {
            display: none;
        }

        body.together .vignette {
            opacity: 0.4;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        #content-wrapper {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
            margin-bottom: 30px;
        }

        #countdown {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .time-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(8px);
            min-width: 90px;
        }

        .time-box span {
            display: block;
            font-size: 2.8rem;
            font-weight: 700;
            color: #fff;
        }

        .label {
            font-size: 0.7rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #message {
            display: none;
            font-family: 'Dancing Script', cursive;
            font-size: 6rem;
            color: var(--gold);
            text-shadow: 0 0 20px #fff, 0 0 40px var(--gold);
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="background-overlay" id="bg"></div>
    <div class="vignette"></div>
    <div id="star-field"></div>

    <div id="content-wrapper">
        <div id="countdown-container">
            <h1 id="title">Contando cada segundo...</h1>
            <div id="countdown">
                <div class="time-box"><span id="days">00</span><div class="label">Dias</div></div>
                <div class="time-box"><span id="hours">00</span><div class="label">Horas</div></div>
                <div class="time-box"><span id="minutes">00</span><div class="label">Min</div></div>
                <div class="time-box"><span id="seconds">00</span><div class="label">Seg</div></div>
                <div class="time-box"><span id="millis">000</span><div class="label">ms</div></div>
            </div>
        </div>
        <div id="message">FINALMENTE!!</div>
    </div>

    <script>
        const starField = document.getElementById('star-field');
        
        function createStars(count) {
            starField.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.opacity = Math.random();
                star.style.animation = `pulse ${2 + Math.random() * 3}s infinite`;
                starField.appendChild(star);
            }
        }

        let starsActive = false;

        function update() {
            const now = new Date();
            let target = new Date();
            let isTogether = false;

            const day = now.getDay(); 
            const hour = now.getHours();

            // Sábado 16h
            if (day === 6 && hour < 16) {
                target.setHours(16, 0, 0, 0);
            } 
            // Domingo 13h
            else if (day === 0 && hour < 13) {
                target.setHours(13, 0, 0, 0);
            }
            // Período "Juntos"
            else if ((day === 6 && hour >= 16) || (day === 0 && hour >= 13)) {
                isTogether = true;
            }
            // Dias de semana
            else {
                let diffToSat = (6 - day + 7) % 7;
                if (diffToSat === 0) diffToSat = 7;
                target.setDate(now.getDate() + diffToSat);
                target.setHours(16, 0, 0, 0);
            }

            if (isTogether) {
                if (!document.body.classList.contains('together')) {
                    document.body.classList.add('together');
                    document.getElementById('countdown-container').style.display = 'none';
                    document.getElementById('message').style.display = 'block';
                }
            } else {
                if (document.body.classList.contains('together') || !starsActive) {
                    document.body.classList.remove('together');
                    document.getElementById('countdown-container').style.display = 'block';
                    document.getElementById('message').style.display = 'none';
                    createStars(200);
                    starsActive = true;
                }

                const diff = target - now;
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                const ms = Math.floor(diff % 1000);

                document.getElementById('days').innerText = d.toString().padStart(2, '0');
                document.getElementById('hours').innerText = h.toString().padStart(2, '0');
                document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
                document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
                document.getElementById('millis').innerText = ms.toString().padStart(3, '0');
            }
        }

        setInterval(update, 10);
    </script>
</body>
</html>
